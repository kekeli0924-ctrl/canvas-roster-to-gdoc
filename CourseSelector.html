<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        color: #333;
      }
      h3 {
        margin-top: 0;
        margin-bottom: 16px;
      }
      label.field-label {
        display: block;
        margin-top: 14px;
        font-weight: bold;
        font-size: 13px;
      }
      select {
        width: 100%;
        padding: 8px;
        margin-top: 4px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 13px;
      }
      .course-list {
        max-height: 220px;
        overflow-y: auto;
        border: 1px solid #ddd;
        border-radius: 4px;
        padding: 8px;
        margin-top: 8px;
      }
      .course-item {
        padding: 6px 4px;
        display: flex;
        align-items: center;
        border-bottom: 1px solid #f0f0f0;
      }
      .course-item:last-child {
        border-bottom: none;
      }
      .course-item input[type="checkbox"] {
        margin-right: 10px;
        flex-shrink: 0;
      }
      .course-item label {
        font-weight: normal;
        font-size: 13px;
        cursor: pointer;
      }
      .select-all {
        font-size: 12px;
        color: #4a86c8;
        cursor: pointer;
        margin-top: 6px;
        display: inline-block;
      }
      .select-all:hover {
        text-decoration: underline;
      }
      .btn {
        background: #4a86c8;
        color: white;
        border: none;
        padding: 10px 24px;
        border-radius: 4px;
        cursor: pointer;
        margin-top: 18px;
        font-size: 14px;
        width: 100%;
      }
      .btn:hover {
        background: #3a76b8;
      }
      .btn:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
      .status {
        font-size: 12px;
        color: #666;
        margin-top: 10px;
        min-height: 18px;
      }
      .status a {
        color: #4a86c8;
        font-weight: bold;
      }
      .error {
        color: #d32f2f;
        font-size: 12px;
        margin-top: 8px;
        display: none;
      }
      .loading {
        text-align: center;
        padding: 30px;
        color: #888;
      }
      .results {
        margin-top: 14px;
        border: 1px solid #d4edda;
        border-radius: 4px;
        background: #f0faf0;
        padding: 12px;
        display: none;
      }
      .results a {
        color: #4a86c8;
        text-decoration: none;
      }
      .results a:hover {
        text-decoration: underline;
      }
      .doc-link {
        padding: 4px 0;
        font-size: 13px;
      }
      .doc-link .count {
        color: #888;
        font-size: 11px;
      }
      .folder-link {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid #c3e6cb;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <label class="field-label">Grading Period</label>
    <select id="gradingPeriod">
      <option value="Fall Midterm">Fall Midterm</option>
      <option value="Fall Term">Fall Term</option>
      <option value="Winter Midterm">Winter Midterm</option>
      <option value="Winter Term">Winter Term</option>
      <option value="Spring Midterm">Spring Midterm</option>
      <option value="Spring Term">Spring Term</option>
    </select>

    <label class="field-label">Select Courses</label>
    <span class="select-all" onclick="toggleAll()">Select All / Deselect All</span>
    <div class="course-list" id="courseList">
      <div class="loading">Loading courses from Canvas...</div>
    </div>

    <div class="error" id="error"></div>
    <div class="status" id="status"></div>

    <button class="btn" id="generateBtn" onclick="generate()" disabled>
      Generate Templates
    </button>

    <div class="results" id="results"></div>

    <script>
      // Load courses when dialog opens
      google.script.run
        .withSuccessHandler(function (data) {
          renderCourses(data);
        })
        .withFailureHandler(function (err) {
          document.getElementById("courseList").innerHTML =
            '<div class="loading" style="color:#d32f2f">Error: ' +
            escapeHtml(err.message) +
            "</div>";
        })
        .getStoredCourses();

      function renderCourses(courses) {
        var html = "";
        for (var i = 0; i < courses.length; i++) {
          var c = courses[i];
          html +=
            '<div class="course-item">' +
            '<input type="checkbox" id="course_' + c.id + '" value="' + c.id + '" onchange="checkSelection()">' +
            '<label for="course_' + c.id + '">' + escapeHtml(c.name) + "</label>" +
            "</div>";
        }
        if (courses.length === 0) {
          html = '<div class="loading">No courses found.</div>';
        }
        document.getElementById("courseList").innerHTML = html;
      }

      function escapeHtml(text) {
        var div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      function toggleAll() {
        var boxes = document.querySelectorAll('#courseList input[type="checkbox"]');
        var allChecked = Array.from(boxes).every(function (cb) { return cb.checked; });
        boxes.forEach(function (cb) { cb.checked = !allChecked; });
        checkSelection();
      }

      function checkSelection() {
        var checked = document.querySelectorAll('#courseList input[type="checkbox"]:checked');
        document.getElementById("generateBtn").disabled = checked.length === 0;
      }

      function generate() {
        var btn = document.getElementById("generateBtn");
        var errorEl = document.getElementById("error");
        var statusEl = document.getElementById("status");
        var resultsEl = document.getElementById("results");

        btn.disabled = true;
        btn.textContent = "Generating...";
        errorEl.style.display = "none";
        resultsEl.style.display = "none";
        statusEl.textContent = "Fetching rosters and creating documents...";

        var checked = document.querySelectorAll('#courseList input[type="checkbox"]:checked');
        var courseIds = Array.from(checked).map(function (cb) { return cb.value; });
        var gradingPeriod = document.getElementById("gradingPeriod").value;

        google.script.run
          .withSuccessHandler(function (result) {
            statusEl.textContent = "";
            btn.textContent = "Done!";
            showResults(result);
          })
          .withFailureHandler(function (err) {
            errorEl.style.display = "block";
            errorEl.textContent = "Error: " + err.message;
            btn.disabled = false;
            btn.textContent = "Generate Templates";
            statusEl.textContent = "";
          })
          .generateTemplate(courseIds, gradingPeriod);
      }

      function showResults(result) {
        var html = "<strong>Created " + result.docs.length + " document(s):</strong><br><br>";

        for (var i = 0; i < result.docs.length; i++) {
          var doc = result.docs[i];
          html +=
            '<div class="doc-link">' +
            '<a href="' + doc.url + '" target="_blank">' + escapeHtml(doc.name) + "</a> " +
            '<span class="count">(' + doc.studentCount + " students)</span>" +
            "</div>";
        }

        html +=
          '<div class="folder-link">' +
          '<a href="' + result.folderUrl + '" target="_blank">Open Drive folder</a>' +
          "</div>";

        var resultsEl = document.getElementById("results");
        resultsEl.innerHTML = html;
        resultsEl.style.display = "block";
      }
    </script>
  </body>
</html>
